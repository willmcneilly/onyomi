<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Onyomi — Cache</title>
    <link rel="stylesheet" href="tokens.css" />
    <style>
      html,
      body {
        margin: 0;
        background: var(--ox-w-bg);
        color: var(--ox-w-text);
        font: 14px/1.55 var(--ox-font);
      }
      main {
        max-width: 1000px;
        margin: 0 auto;
        padding: 36px 48px 56px;
      }
      a {
        color: var(--ox-w-gold);
      }

      /* ─── Mark (nested-square) ─── */
      .ox-mark {
        width: 40px;
        height: 40px;
        background: var(--ox-w-ink);
        border-radius: 10px;
        display: grid;
        place-items: center;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        flex: 0 0 auto;
      }
      .ox-mark-inner {
        width: 28px;
        height: 28px;
        background: var(--ox-w-gold-bg);
        border-radius: 7px;
        display: grid;
        place-items: center;
        color: var(--ox-w-ink);
        font: 600 20px/1 var(--ox-font-jp);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22);
      }

      /* ─── Header ─── */
      header.page {
        display: flex;
        align-items: flex-start;
        gap: 24px;
        margin-bottom: 22px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--ox-w-rule);
      }
      .head-left {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        flex: 1;
        min-width: 0;
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
      }
      .breadcrumb a {
        color: var(--ox-w-text-2);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--ox-w-gold);
      }
      .breadcrumb .sep {
        color: var(--ox-w-faint);
      }
      .breadcrumb .here {
        color: var(--ox-w-text);
        font-weight: 600;
      }
      h1 {
        margin: 4px 0 4px;
        font: 600 28px/1.1 var(--ox-font);
        letter-spacing: -0.02em;
      }
      .tagline {
        font-size: 13.5px;
        color: var(--ox-w-text-2);
      }
      #summary {
        font-size: 12.5px;
        color: var(--ox-w-mute);
        text-align: right;
        font-variant-numeric: tabular-nums;
        flex: 0 0 auto;
      }

      /* ─── Toolbar ─── */
      .toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
        align-items: stretch;
      }
      .search {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--ox-w-bg);
        border: 1px solid var(--ox-w-rule);
        border-radius: 8px;
        padding: 0 12px;
      }
      .search:focus-within {
        border-color: var(--ox-w-gold);
      }
      .search svg {
        flex: 0 0 auto;
        color: var(--ox-w-mute);
      }
      .search input {
        flex: 1;
        padding: 9px 0;
        background: transparent;
        border: 0;
        outline: none;
        font: 13px/1.4 var(--ox-font);
        color: var(--ox-w-text);
      }
      .search input::placeholder {
        color: var(--ox-w-mute);
      }
      .view-toggle {
        display: inline-flex;
        background: var(--ox-w-bg-2);
        border: 1px solid var(--ox-w-rule);
        border-radius: 8px;
        padding: 2px;
      }
      .view-toggle button {
        border: 0;
        background: transparent;
        padding: 6px 14px;
        color: var(--ox-w-text-2);
        font: 500 12.5px/1.4 var(--ox-font);
        border-radius: 6px;
        cursor: pointer;
      }
      .view-toggle button.active {
        background: var(--ox-w-bg);
        color: var(--ox-w-text);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
      }
      .btn-ghost {
        padding: 0 14px;
        background: var(--ox-w-bg);
        color: var(--ox-w-text);
        border: 1px solid var(--ox-w-rule);
        border-radius: 8px;
        font: 500 13px/1.4 var(--ox-font);
        cursor: pointer;
      }
      .btn-ghost:hover {
        background: var(--ox-w-bg-2);
      }
      .btn-danger {
        color: var(--ox-w-bad);
        border-color: rgba(169, 58, 58, 0.3);
      }
      .btn-danger:hover {
        background: rgba(169, 58, 58, 0.06);
      }

      /* ─── Empty state ─── */
      #empty {
        text-align: center;
        padding: 64px 0;
        color: var(--ox-w-mute);
        font-size: 14px;
      }
      #empty .mark-empty {
        margin: 0 auto 16px;
        opacity: 0.4;
      }

      /* ─── By-phrase view ─── */
      .phrase-row {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        padding: 18px 4px;
        border-top: 1px solid var(--ox-w-rule);
      }
      .phrase-row:last-child {
        border-bottom: 1px solid var(--ox-w-rule);
      }
      .phrase-main {
        flex: 1;
        min-width: 0;
      }
      .phrase-text {
        font: 400 17px/1.5 var(--ox-font-jp);
        color: var(--ox-w-text);
      }
      .chips {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--ox-w-bg);
        border: 1px solid var(--ox-w-rule);
        color: var(--ox-w-text-2);
        padding: 4px 4px 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }
      .chip.recent {
        background: rgba(227, 167, 46, 0.20);
        border-color: var(--ox-w-gold);
        color: var(--ox-w-gold-dk);
      }
      .chip .jp {
        font-family: var(--ox-font-jp);
        color: var(--ox-w-text);
      }
      .chip.recent .jp {
        color: var(--ox-w-gold-dk);
      }
      .chip .meta {
        color: var(--ox-w-mute);
        font-size: 11px;
      }
      .chip-play {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--ox-w-ink);
        color: var(--ox-w-gold-bg);
        border: 0;
        cursor: pointer;
        display: grid;
        place-items: center;
        margin-left: 2px;
        flex: 0 0 auto;
      }
      .chip-play:hover {
        background: #2a241c;
      }
      .chip-play svg {
        width: 9px;
        height: 9px;
      }
      .phrase-side {
        text-align: right;
        flex: 0 0 auto;
        min-width: 110px;
      }
      .phrase-side .voices-count {
        font: 500 10.5px/1.2 var(--ox-font);
        color: var(--ox-w-mute);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .phrase-side .total-size {
        font-size: 15px;
        font-weight: 600;
        margin-top: 2px;
      }
      .phrase-trash {
        margin-top: 8px;
        background: transparent;
        border: 1px solid var(--ox-w-rule);
        width: 28px;
        height: 28px;
        border-radius: 7px;
        color: var(--ox-w-text-2);
        cursor: pointer;
        display: inline-grid;
        place-items: center;
      }
      .phrase-trash:hover {
        background: var(--ox-w-bg-2);
        color: var(--ox-w-bad);
      }
      .phrase-trash svg {
        width: 12px;
        height: 12px;
      }

      /* ─── Flat view ─── */
      table.flat {
        width: 100%;
        border-collapse: collapse;
        font-variant-numeric: tabular-nums;
      }
      table.flat th,
      table.flat td {
        text-align: left;
        padding: 10px 8px;
        border-bottom: 1px solid var(--ox-w-rule);
        vertical-align: middle;
      }
      table.flat th {
        color: var(--ox-w-mute);
        font: 600 11px/1.3 var(--ox-font);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      table.flat tr:hover td {
        background: var(--ox-w-bg-2);
      }
      table.flat td.flat-text {
        font-family: var(--ox-font-jp);
        font-size: 14.5px;
        max-width: 380px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      table.flat td.flat-voice {
        font-size: 12.5px;
      }
      table.flat td.flat-voice .jp {
        font-family: var(--ox-font-jp);
        margin-right: 4px;
      }
      table.flat td.actions {
        white-space: nowrap;
        width: 1%;
      }
      table.flat td.actions button + button {
        margin-left: 4px;
      }
      table.flat .row-btn {
        background: transparent;
        border: 1px solid var(--ox-w-rule);
        width: 26px;
        height: 26px;
        border-radius: 6px;
        cursor: pointer;
        display: inline-grid;
        place-items: center;
        color: var(--ox-w-text-2);
      }
      table.flat .row-btn:hover {
        background: var(--ox-w-bg-2);
      }
      table.flat .row-btn.play {
        background: var(--ox-w-ink);
        color: var(--ox-w-gold-bg);
        border-color: var(--ox-w-ink);
      }
      table.flat .row-btn.play:hover {
        background: #2a241c;
      }
      table.flat .row-btn svg {
        width: 10px;
        height: 10px;
      }
    </style>
  </head>
  <body>
    <main>
      <header class="page">
        <div class="head-left">
          <div class="ox-mark"><div class="ox-mark-inner">音</div></div>
          <div>
            <div class="breadcrumb">
              <a id="optionsLink" href="#">← Options</a>
              <span class="sep">/</span>
              <span class="here">Cache</span>
            </div>
            <h1>Your audio library</h1>
            <div class="tagline">Everything you've heard, kept locally and ready to replay.</div>
          </div>
        </div>
        <div id="summary">Loading…</div>
      </header>

      <div class="toolbar">
        <div class="search">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" aria-hidden="true">
            <circle cx="7" cy="7" r="4" />
            <path d="m13 13-3-3" />
          </svg>
          <input id="search" type="search" placeholder="Filter by text or voice…" />
        </div>
        <div class="view-toggle" role="tablist" aria-label="View mode">
          <button id="viewPhrase" type="button" data-view="phrase">By phrase</button>
          <button id="viewFlat" type="button" data-view="flat">Flat</button>
        </div>
        <button class="btn-ghost btn-danger" id="clearAll" type="button">Clear all</button>
      </div>

      <div id="phraseView"></div>
      <table class="flat" id="flatView" style="display: none">
        <thead>
          <tr>
            <th>Text</th>
            <th>Voice</th>
            <th>Added</th>
            <th>Size</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="flatBody"></tbody>
      </table>

      <div id="empty" style="display: none">
        <div class="ox-mark mark-empty"><div class="ox-mark-inner">音</div></div>
        No cached audio yet. Play something on any page to start caching.
      </div>
    </main>

    <script type="module" src="cache.js"></script>
  </body>
</html>
